name: Build the Twine game

permissions:
  contents: write

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 */15 * *"

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set game configuration
        run: |
          echo "APP_NAME=Leviathan Story Dev Build" >> $GITHUB_ENV
          echo "DESCRIPTION=A story dev build for interactions in game Leviathan" >> $GITHUB_ENV
          echo "VERSION=1.0.0" >> $GITHUB_ENV
          echo "AUTHOR=${{ github.repository_owner }}" >> $GITHUB_ENV

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Check out Electron app template
        uses: actions/checkout@v3
        with:
          repository: lazerwalker/electron-wrapper-template
          ref: v1.1.0
          path: build-workspace  # Renamed to clarify this is the only build area

      - name: Prepare Build Workspace
        run: |
          # 1. Save the essential Electron main.js
          cp ./build-workspace/src/main.js ./main-backup.js

          # 2. Wipe the template's source to ensure no "test-electron-forge" remains
          rm -rf ./build-workspace/src/*

          # 3. Copy ONLY the contents of your /game folder into the build workspace
          if [ -d "./game" ]; then
            cp -ra ./game/. ./build-workspace/src/
            echo "Copied /game contents to workspace."
          else
            echo "ERROR: /game folder not found!"
            exit 1
          fi

          # 4. Put the Electron "brain" back
          mv ./main-backup.js ./build-workspace/src/main.js

          # 5. Ensure the HTML entry point is named index.html
          if [ -f "./build-workspace/src/game.html" ]; then
            mv ./build-workspace/src/game.html ./build-workspace/src/index.html
          fi

          # 6. Handle the icon
          if [ -f "./game/icon.png" ]; then
            cp ./game/icon.png ./build-workspace/icon.png
          fi

          # 7. CRITICAL: Delete the original game folder from the root
          # This prevents the Electron packager from finding and including it in the final EXE
          rm -rf ./game

      - name: Install Dependencies
        working-directory: ./build-workspace
        run: npm install

      - name: Set package metadata
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('./build-workspace/package.json'));
          pkg.name = 'leviathan-build';
          pkg.description = process.env.DESCRIPTION;
          pkg.version = process.env.VERSION;
          pkg.author = process.env.AUTHOR;
          pkg.main = 'src/main.js';
          fs.writeFileSync('./build-workspace/package.json', JSON.stringify(pkg, null, 2));"

      - name: Build icons
        working-directory: ./build-workspace
        run: npm run build-icons

      - name: Build the app
        working-directory: ./build-workspace
        run: npm run make

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ format('{0}.0.0', github.run_number) }}
          files: |
            build-workspace/out/**/*.deb
            build-workspace/out/**/*.dmg
            build-workspace/out/**/*Setup.exe
            build-workspace/out/**/*.rpm
            build-workspace/out/**/*.zip