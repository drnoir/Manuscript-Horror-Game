name: Build Twine Game

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Checkout Template
        uses: actions/checkout@v4
        with:
          repository: lazerwalker/electron-wrapper-template
          ref: v1.1.0
          path: build-workspace

      - name: Prepare Internal Structure
        shell: bash
        run: |
          # 1. Clean out template
          rm -rf ./build-workspace/src/*

          # 2. Move your game files in
          cp -ra ./game/. ./build-workspace/src/

          # 3. Ensure index.html exists
          if [ -f "./build-workspace/src/game.html" ]; then
            mv ./build-workspace/src/game.html ./build-workspace/src/index.html
          fi

          # 4. Handle Icon (Always needed)
          if [ -f "./game/icon.png" ]; then
            cp ./game/icon.png ./build-workspace/icon.png
          else
            # Create a tiny dummy icon if missing so it doesn't crash
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==" | base64 -d > ./build-workspace/icon.png
          fi

      - name: Final Config Fix
        run: |
          node -e "
          const fs = require('fs');
          const p = './build-workspace/package.json';
          const pkg = JSON.parse(fs.readFileSync(p));
          
          // Core Setup
          pkg.name = 'leviathan-story';
          pkg.productName = 'Leviathan-Story';
          pkg.main = 'main.js'; // The template's entry script
          
          // Ensure the template knows to load from the src folder
          pkg.config = pkg.config || {};
          pkg.config.forge = pkg.config.forge || {};
          
          fs.writeFileSync(p, JSON.stringify(pkg, null, 2));"

      - name: Build
        working-directory: ./build-workspace
        run: |
          npm install
          npm run make -- --targets @electron-forge/maker-zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            build-workspace/out/make/zip/win32/x64/*.zip