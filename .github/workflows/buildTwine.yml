name: Build the Twine game

permissions:
  contents: write

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 */15 * *"

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set game configuration
        run: |
          echo "APP_NAME=Leviathan Story Dev Build" >> $GITHUB_ENV
          echo "DESCRIPTION=A story dev build for interactions in game Leviathan" >> $GITHUB_ENV
          echo "VERSION=1.0.0" >> $GITHUB_ENV
          echo "AUTHOR=${{ github.repository_owner }}" >> $GITHUB_ENV
          echo "PUBLISH_ON_WEB=false" >> $GITHUB_ENV

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Test for presence of Windows codesigning secrets
        id: vars
        run: |
          if [[ -n "${{ secrets.CERTIFICATE_WINDOWS_PFX }}" ]]; then 
            echo "HAS_WINDOWS_CREDS=true" >> $GITHUB_OUTPUT
          fi

      - name: Check out Electron app template
        uses: actions/checkout@v3
        with:
          repository: lazerwalker/electron-wrapper-template
          ref: v1.1.0
          path: electron-temp

      - name: move webapp into Electron folder
        run: |
          # 1. Clean the template's default source directory entirely
          rm -rf ./electron-temp/src/*

          # 2. Copy the ENTIRE contents of /game (including subfolders like images/ or sounds/)
          # The -a flag preserves attributes and recursion perfectly
          if [ -d "./game" ]; then
            cp -ra ./game/. ./electron-temp/src/
            echo "Contents of /game copied to Electron src:"
            ls -R ./electron-temp/src/
          else
            echo "ERROR: Directory /game not found at root!"
            exit 1
          fi
          
          # 3. Handle the HTML entry point
          # We rename game.html to index.html because Electron looks for index.html by default
          if [ -f "./electron-temp/src/game.html" ]; then
            mv ./electron-temp/src/game.html ./electron-temp/src/index.html
            echo "Successfully renamed game.html to index.html"
          elif [ -f "./electron-temp/src/index.html" ]; then
            echo "index.html already exists, proceeding..."
          else
            echo "ERROR: Neither game.html nor index.html found in ./game folder!"
            exit 1
          fi

          # 4. Handle Icon
          if [ -f "./game/icon.png" ]; then
            cp ./game/icon.png ./electron-temp/icon.png
          elif [ -f "./icon.png" ]; then
            cp ./icon.png ./electron-temp/icon.png
          fi
          
          # 5. Finalize directory structure
          rm -rf ./app 
          mv ./electron-temp ./app

      - name: Set up Electron app environment
        working-directory: ./app
        run: npm install

      - name: Generate icons
        working-directory: ./app
        run: npm run build-icons

      - name: Add Windows certificate
        if: steps.vars.outputs.HAS_WINDOWS_CREDS
        id: write_file
        uses: timheuer/base64-to-file@v1
        with:
          fileName: "win-certificate.pfx"
          encodedString: ${{ secrets.CERTIFICATE_WINDOWS_PFX }}

      - name: Set description and version number
        run: |
          node -e "
          const fs = require('fs');
          const pkg = require('./app/package.json');
          pkg.description = process.env.DESCRIPTION;
          pkg.version = process.env.VERSION;
          pkg.author = process.env.AUTHOR;
          fs.writeFileSync('./app/package.json', JSON.stringify(pkg, null, '\t'));"
          
      - name: Build the app
        working-directory: ./app
        env:
          WINDOWS_PFX_FILE: ${{ steps.write_file.outputs.filePath }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: npm run make

      - name: Create Tag and Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ format('{0}.0.0', github.run_number) }}
          files: |
            app/out/**/*.deb
            app/out/**/*.dmg
            app/out/**/*Setup.exe
            app/out/**/*.rpm
            app/out/**/*.zip