name: Build Twine Game

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 1. Get the template and put it in a separate workspace
      - name: Checkout Template
        uses: actions/checkout@v4
        with:
          repository: lazerwalker/electron-wrapper-template
          ref: v1.1.0
          path: build-workspace

      # 2. Setup the internal structure
      - name: Prepare Internal Structure
        shell: bash
        run: |
          # Delete template's sample files
          rm -rf ./build-workspace/src/*

          # Copy ONLY your game contents into the template's src folder
          cp -ra ./game/. ./build-workspace/src/

          # RENAME your game.html to index.html so main.js can find it
          if [ -f "./build-workspace/src/game.html" ]; then
            mv ./build-workspace/src/game.html ./build-workspace/src/index.html
          fi

          # Copy icon if it exists
          if [ -f "./game/icon.png" ]; then
            cp ./game/icon.png ./build-workspace/icon.png
          fi

      # 3. Fix the "Module Not Found" by forcing package.json settings
      - name: Configure App Metadata
        run: |
          node -e "
          const fs = require('fs');
          const path = './build-workspace/package.json';
          const pkg = JSON.parse(fs.readFileSync(path));
          
          pkg.name = 'leviathan-story';
          pkg.productName = 'Leviathan Story';
          // Ensure Electron looks for the template's main script in the root
          pkg.main = 'main.js'; 
          
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2));"

      # 4. Final Compilation
      - name: Install and Make
        working-directory: ./build-workspace
        run: |
          npm install
          npm run build-icons
          npm run make

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          files: |
            build-workspace/out/**/*.zip
            build-workspace/out/**/*Setup.exe