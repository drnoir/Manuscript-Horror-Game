name: Build Twine Game to Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 1. Pull the Template
      - name: Checkout Electron Template
        uses: actions/checkout@v4
        with:
          repository: lazerwalker/electron-wrapper-template
          ref: v1.1.0
          path: electron-build-box

      # 2. Prepare the Source
      - name: Prepare Assets
        shell: bash
        run: |
          # Clear out the template's default src folder completely
          rm -rf ./electron-build-box/src/*

          # Copy your /game folder contents into the template's src
          if [ -d "./game" ]; then
            cp -ra ./game/. ./electron-build-box/src/
            echo "Successfully copied /game assets."
          else
            echo "ERROR: /game directory not found!"
            exit 1
          fi

          # Force rename your game.html to index.html (Standard Electron Entry)
          if [ -f "./electron-build-box/src/game.html" ]; then
            mv ./electron-build-box/src/game.html ./electron-build-box/src/index.html
          fi

          # Handle the icon
          if [ -f "./game/icon.png" ]; then
            cp ./game/icon.png ./electron-build-box/icon.png
          fi

      # 3. Configure Metadata and Entry Point
      - name: Configure Package
        run: |
          node -e "
          const fs = require('fs');
          const path = './electron-build-box/package.json';
          const pkg = JSON.parse(fs.readFileSync(path));
          
          // These are the critical values for Electron Forge
          pkg.name = 'leviathan-story';
          pkg.productName = 'Leviathan Story Dev Build';
          pkg.version = '1.0.${{ github.run_number }}';
          
          // The template usually has its main script in the root, 
          // we leave pkg.main as it was in the template to avoid the 'cannot stat' error.
          
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2));"

      # 4. Install and Build
      - name: Build EXE
        working-directory: ./electron-build-box
        run: |
          npm install
          npm run build-icons
          npm run make

      # 5. Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: Release Build ${{ github.run_number }}
          files: |
            electron-build-box/out/**/*.zip
            electron-build-box/out/**/*Setup.exe