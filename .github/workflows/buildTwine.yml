name: Build Twine Game to Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. Pull your repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Pull the Electron Wrapper Template into a separate folder
      - name: Checkout Electron Template
        uses: actions/checkout@v4
        with:
          repository: lazerwalker/electron-wrapper-template
          ref: v1.1.0
          path: electron-build-box

      # 4. Prepare the Build (The "Magic" Step)
      - name: Prepare Assets
        shell: bash
        run: |
          # A. Backup the template's startup script (main.js)
          cp ./electron-build-box/src/main.js ./main-temp.js

          # B. Clear out ALL template boilerplate
          rm -rf ./electron-build-box/src/*

          # C. Restore the startup script
          mv ./main-temp.js ./electron-build-box/src/main.js

          # D. Copy ONLY your /game folder contents into the Electron source
          if [ -d "./game" ]; then
            cp -ra ./game/. ./electron-build-box/src/
            echo "Successfully copied /game assets."
          else
            echo "ERROR: /game directory not found!"
            exit 1
          fi

          # E. Ensure game.html is the entry point
          # If game.html exists in src, rename it to index.html for Electron
          if [ -f "./electron-build-box/src/game.html" ]; then
            mv ./electron-build-box/src/game.html ./electron-build-box/src/index.html
            echo "Renamed game.html to index.html"
          fi

          # F. Handle icons (searches game folder then root)
          if [ -f "./game/icon.png" ]; then
            cp ./game/icon.png ./electron-build-box/icon.png
          elif [ -f "./icon.png" ]; then
            cp ./icon.png ./electron-build-box/icon.png
          fi

      # 5. Configure Metadata (App Name, Version, etc.)
      - name: Configure Package
        run: |
          node -e "
          const fs = require('fs');
          const path = './electron-build-box/package.json';
          const pkg = JSON.parse(fs.readFileSync(path));
          pkg.name = 'leviathan-story';
          pkg.productName = 'Leviathan Story Dev Build';
          pkg.version = '1.0.${{ github.run_number }}';
          pkg.description = 'Twine game build from /game directory';
          pkg.main = 'src/main.js';
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2));"

      # 6. Install Dependencies and Compile
      - name: Build EXE
        working-directory: ./electron-build-box
        run: |
          npm install
          npm run build-icons
          npm run make

      # 7. Release the Build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: Release Build ${{ github.run_number }}
          files: |
            electron-build-box/out/**/*.zip
            electron-build-box/out/**/*Setup.exe