name: Build Twine Game

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Checkout Template
        uses: actions/checkout@v4
        with:
          repository: lazerwalker/electron-wrapper-template
          ref: v1.1.0
          path: build-workspace

      - name: Prepare Internal Structure
        shell: bash
        run: |
          # 1. Clean out template src
          rm -rf ./build-workspace/src/*

          # 2. Move your game files in
          cp -ra ./game/. ./build-workspace/src/

          # 3. Ensure your file is named index.html for the template
          if [ -f "./build-workspace/src/game.html" ]; then
            mv ./build-workspace/src/game.html ./build-workspace/src/index.html
          fi

          # 4. Handle Icon (Dummy icon if missing to prevent crash)
          if [ -f "./game/icon.png" ]; then
            cp ./game/icon.png ./build-workspace/icon.png
          else
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==" | base64 -d > ./build-workspace/icon.png
          fi

      - name: Manual Build via Packager
        working-directory: ./build-workspace
        run: |
          npm install
          # We bypass Forge's 'make' and use electron-packager directly
          npx electron-packager . Leviathan-Story --platform=win32 --arch=x64 --out=dist --overwrite

      - name: Zip the Build
        shell: powershell
        run: |
          Compress-Archive -Path ./build-workspace/dist/Leviathan-Story-win32-x64/* -DestinationPath ./Leviathan-Story-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ./Leviathan-Story-Windows.zip